<div class="auth-wrapper">
  <div class="auth-card">
    <div class="brand-panel">
      <div class="logo-row">
        <div class="logo-badge">IC</div>
        <div class="logo-info">
          <span class="logo-name">IComp</span>
          <span class="logo-sub">Instituto de Computação</span>
        </div>
      </div>
      <div class="brand-body">
        <span class="brand-title">TCComp</span>
        <p class="brand-subtitle">O sistema de Gerenciamento de TCC do IComp!</p>
      </div>
    </div>
    <div class="form-panel">
      <h3 class="form-title">Esqueceu sua senha?</h3>
      <p style="font-size:0.875rem;color:#555;margin-bottom:16px;line-height:1.5;">
        Para redefinir sua senha, informe o e-mail cadastrado na sua conta e lhe enviaremos um link com as instruções.
      </p>
      <form [formGroup]="form" (ngSubmit)="submit()" class="form-gap">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" formControlName="email">
        </mat-form-field>
        <button mat-raised-button type="submit" class="full-width submit-btn">REDEFINIR SENHA</button>
        <a class="link-text" (click)="cancelar()">Cancelar</a>
      </form>
    </div>
  </div>
</div>
