<div class="auth-wrapper">
  <div class="auth-card">
    <div class="brand-panel">
      <div class="logo-row">
        <div class="logo-badge">IC</div>
        <div class="logo-info">
          <span class="logo-name">IComp</span>
          <span class="logo-sub">Instituto de Computação</span>
        </div>
      </div>
      <div class="brand-body">
        <span class="brand-title">TCComp</span>
        <p class="brand-subtitle">O sistema de Gerenciamento de TCC do IComp!</p>
      </div>
    </div>
    <div class="form-panel">
      <h3 class="form-title">Redefinir Senha</h3>
      <form [formGroup]="form" (ngSubmit)="submit()" class="form-gap">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nova Senha</mat-label>
          <input matInput type="password" formControlName="nova_senha">
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Confirmar nova Senha</mat-label>
          <input matInput type="password" formControlName="confirmar_senha">
        </mat-form-field>
        <button mat-raised-button type="submit" class="full-width submit-btn">REDEFINIR SENHA</button>
        <a class="link-text" (click)="cancelar()">Cancelar</a>
      </form>
    </div>
  </div>
</div>
